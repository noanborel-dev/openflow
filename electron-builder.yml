appId: app.yappr
productName: Yappr
copyright: Copyright © 2026 Yappr

# Where electron-builder uploads artifacts when --publish is on. The
# GitHub provider matches the repo from the GIT_REPO env var or
# package.json "repository" field, and the asset names below mean the
# landing page can link directly at
# https://github.com/<owner>/<repo>/releases/latest/download/<assetName>
publish:
  provider: github
  releaseType: release

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: assets/
    to: assets/

# Native modules and external binaries that the main process spawns
# or dlopen()s must live outside the asar archive so the runtime can
# resolve real filesystem paths:
#   - node-global-key-listener: precompiled MacKeyServer helper
#   - @ffmpeg-installer/ffmpeg: per-platform ffmpeg binary (LGPL-2.1).
#     The actual binary lives in a per-platform sub-package
#     (@ffmpeg-installer/darwin-arm64, /darwin-x64, /win32-x64, etc.),
#     resolved at runtime via the parent package's `.path` export.
#   - @fugood/whisper.node + per-platform `@fugood/node-whisper-*`
#     packages: prebuilt NAPI addons that load libwhisper at runtime.
#   - better-sqlite3: NAPI addon (Feature 4 context-memory store).
asarUnpack:
  - node_modules/node-global-key-listener/**/*
  - node_modules/@ffmpeg-installer/**/*
  - node_modules/@fugood/whisper.node/**/*
  - node_modules/@fugood/node-whisper-*/**/*
  - node_modules/better-sqlite3/**/*

mac:
  category: public.app-category.productivity
  # Wordmark-pill icon. Generated via scripts/generate-icon.html →
  # scripts/png-to-icns.sh from a 1024×1024 PNG render.
  icon: assets/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Bundled native code gets individually code-signed before the app
  # is sealed — `codesign --deep` is deprecated by Apple, listing
  # binaries explicitly is the supported pattern.
  # Paths are relative to Contents/ inside the .app.
  binaries:
    - Resources/app.asar.unpacked/node_modules/@ffmpeg-installer/darwin-arm64/ffmpeg
    - Resources/app.asar.unpacked/node_modules/@ffmpeg-installer/darwin-x64/ffmpeg
    - Resources/app.asar.unpacked/node_modules/@fugood/node-whisper-darwin-arm64/index.node
    - Resources/app.asar.unpacked/node_modules/@fugood/node-whisper-darwin-x64/index.node
  hardenedRuntime: true
  gatekeeperAssess: false
  # Surfaced when macOS first prompts for permissions. Without these
  # strings the OS shows a generic "wants to use the microphone"
  # without app context.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Yappr records audio when you press your hotkey, then sends it
      to your chosen API provider for transcription.
    NSAppleEventsUsageDescription: >-
      Yappr uses Apple Events to paste your dictated text into the
      focused app.
    # LSUIElement makes Yappr a tray-only app — no Dock icon, no
    # menu bar. The recording pill + tray menu are the entire surface.
    LSUIElement: true
  notarize: false

dmg:
  title: ${productName} ${version}
  # Versionless filenames so the landing page can hardcode:
  #   .../releases/latest/download/Yappr-arm64.dmg
  # and never break on a new release. The version is still embedded
  # inside the .app bundle's Info.plist for auto-update + diagnostics.
  artifactName: ${productName}-${arch}.${ext}

win:
  target: nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target: AppImage
  category: Utility
