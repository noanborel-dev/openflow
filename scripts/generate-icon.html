<!doctype html>
<!--
  Open in any browser, click "Download 1024×1024 PNG", save the file as
  `assets/icon.png` in the repo root, then run scripts/png-to-icns.sh.

  Design: the Yappr indicator pill, miniature, centered on a cream
  plate. macOS clips the icon to a squircle so the cream becomes the
  rounded-square app icon and the pill floats centered inside —
  recognizable as "the Yappr pill" without trying to fit the
  wordmark at icon scale.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Yappr Icon Generator</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #d9d4c3; font-family: -apple-system, system-ui, sans-serif; gap: 18px; padding: 24px; }
  canvas { background: transparent; border: 1px dashed rgba(0,0,0,0.18); border-radius: 18px; width: 320px; height: 320px; }
  .row { display: flex; gap: 12px; }
  button { padding: 10px 22px; border-radius: 999px; background: #0a0a0a; color: #faf8f0; border: none; font: inherit; font-weight: 500; font-size: 14px; cursor: pointer; }
  button:hover { opacity: 0.9; }
  p { font-size: 13px; color: rgba(0,0,0,0.6); margin: 0; max-width: 520px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <canvas id="c" width="1024" height="1024"></canvas>
  <div class="row">
    <button onclick="download(1024)">Download 1024×1024 PNG</button>
    <button onclick="download(512)">Download 512×512</button>
  </div>
  <p>Save as <code>assets/icon.png</code>, then run <code>scripts/png-to-icns.sh</code> from the repo root to produce <code>assets/icon.icns</code>.</p>

<script>
const c = document.getElementById('c')
const ctx = c.getContext('2d')

function roundRect(x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x + r, y)
  ctx.lineTo(x + w - r, y)
  ctx.arcTo(x + w, y, x + w, y + r, r)
  ctx.lineTo(x + w, y + h - r)
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r)
  ctx.lineTo(x + r, y + h)
  ctx.arcTo(x, y + h, x, y + h - r, r)
  ctx.lineTo(x, y + r)
  ctx.arcTo(x, y, x + r, y, r)
  ctx.closePath()
}

function draw(size) {
  c.width = size; c.height = size
  ctx.clearRect(0, 0, size, size)

  // ===== Cream plate (full bleed; macOS squircles it) =====
  const plateGrad = ctx.createLinearGradient(0, 0, 0, size)
  plateGrad.addColorStop(0, '#fbf9f1')
  plateGrad.addColorStop(1, '#efe9d8')
  ctx.fillStyle = plateGrad
  ctx.fillRect(0, 0, size, size)

  // ===== The pill — centered, ~62% of the width =====
  const pillW = size * 0.62
  const pillH = size * 0.30
  const pillX = (size - pillW) / 2
  const pillY = (size - pillH) / 2
  const pillR = pillH / 2

  // Soft shadow under pill
  ctx.save()
  ctx.shadowColor = 'rgba(0,0,0,0.32)'
  ctx.shadowBlur = size * 0.045
  ctx.shadowOffsetY = size * 0.018
  // Charcoal gradient — matches MiniPill.tsx
  const pillGrad = ctx.createLinearGradient(0, pillY, 0, pillY + pillH)
  pillGrad.addColorStop(0, 'rgba(18,20,26,1)')
  pillGrad.addColorStop(1, 'rgba(14,16,22,1)')
  ctx.fillStyle = pillGrad
  roundRect(pillX, pillY, pillW, pillH, pillR)
  ctx.fill()
  ctx.restore()

  // Top refractive highlight (inner top border)
  ctx.save()
  ctx.beginPath()
  roundRect(pillX, pillY, pillW, pillH, pillR)
  ctx.clip()
  const hiGrad = ctx.createLinearGradient(0, pillY, 0, pillY + pillH * 0.5)
  hiGrad.addColorStop(0, 'rgba(255,255,255,0.36)')
  hiGrad.addColorStop(1, 'rgba(255,255,255,0)')
  ctx.fillStyle = hiGrad
  ctx.fillRect(pillX, pillY, pillW, pillH * 0.55)
  ctx.restore()

  // Hairline border
  ctx.strokeStyle = 'rgba(255,255,255,0.14)'
  ctx.lineWidth = size * 0.0025
  roundRect(pillX, pillY, pillW, pillH, pillR)
  ctx.stroke()

  // ===== Inner content: red dot + waveform bars =====
  const cy = pillY + pillH / 2
  // Padding from the pill's left/right edges before content starts
  const padX = pillH * 0.55

  // Red recording dot
  const dotR = pillH * 0.16
  const dotX = pillX + padX + dotR
  // Glow halo
  const haloGrad = ctx.createRadialGradient(dotX, cy, dotR * 0.3, dotX, cy, dotR * 3)
  haloGrad.addColorStop(0, 'rgba(232,74,58,0.55)')
  haloGrad.addColorStop(1, 'rgba(232,74,58,0)')
  ctx.fillStyle = haloGrad
  ctx.beginPath()
  ctx.arc(dotX, cy, dotR * 3, 0, Math.PI * 2)
  ctx.fill()
  // Dot
  ctx.fillStyle = '#e84a3a'
  ctx.beginPath()
  ctx.arc(dotX, cy, dotR, 0, Math.PI * 2)
  ctx.fill()

  // Waveform bars — 5 cobalt bars, frozen at a pleasing mid-animation pose
  const barW = size * 0.013
  const barGap = size * 0.013
  const barX0 = dotX + dotR + pillH * 0.32
  // Bar heights as fraction of pillH — chosen to look "active"
  const heights = [0.32, 0.55, 0.22, 0.46, 0.30]
  ctx.fillStyle = '#5a8fe8'
  ctx.shadowColor = 'rgba(90,143,232,0.65)'
  ctx.shadowBlur = size * 0.006
  for (let i = 0; i < heights.length; i++) {
    const bh = pillH * heights[i]
    const bx = barX0 + i * (barW + barGap)
    const by = cy - bh / 2
    // Rounded bar
    roundRect(bx, by, barW, bh, barW / 2)
    ctx.fill()
  }
  ctx.shadowBlur = 0
}

function download(size) {
  draw(size)
  const link = document.createElement('a')
  link.download = `icon-${size}.png`
  link.href = c.toDataURL('image/png')
  link.click()
  draw(1024)  // restore preview
}

draw(1024)
</script>
</body>
</html>
